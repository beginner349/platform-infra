workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - when: never

image: 
  name: hashicorp/terraform:1.14
  entrypoint: [""]
variables:
  TF_ROOT: ${CI_PROJECT_DIR}/terraform
  TF_ADDRESS: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${CI_PROJECT_NAME}

cache:
  key: terraform-cache
  paths:
    - ${TF_ROOT}/.terraform

before_script:
  - cd ${TF_ROOT}
  - terraform --version

stages:
  - init
  - validate
  - plan
  - deploy
  - cleanup

init:
  stage: init
  script:
    - chmod +x ./init.sh
    - ./init.sh

validate:
  stage: validate
  script:
    - terraform validate

plan:
  stage: plan
  script:
    - terraform plan -out=tfplan -input=false
  artifacts:
    paths:
      - tfplan

deploy:
  stage: deploy
  script:
    - terraform apply -input=false -auto-approve tfplan
  dependencies:
    - plan
  when: manual

cleanup:
  stage: cleanup
  script:
    - terraform destroy -auto-approve
  when: manual
  